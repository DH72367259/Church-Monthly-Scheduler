<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA / Home-screen meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PF Events" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a56db" />
  <meta name="description" content="Monthly Sunday Service &amp; Tuesday Prayer Schedule" />

  <title>Peter Foundation Event Details</title>

  <link rel="manifest" href="manifest.json" />
  <!-- iOS home-screen icons (PNG generated by generate-icons.py) -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <link rel="stylesheet" href="css/style.css" />

  <!-- Firebase (compat build for non-module scripts) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div id="app">

    <!-- ── Header ───────────────────────────────────────────────────── -->
    <header class="app-header">
      <button class="hamburger-btn" id="menu-btn" aria-label="Open menu" onclick="openMenu()">&#9776;</button>
      <div class="header-text">
        <h1 class="app-title">Peter Foundation</h1>
        <p class="app-subtitle" id="header-tab-label">Sunday Services</p>
      </div>
      <button class="refresh-btn" id="refresh-btn" aria-label="Refresh" onclick="refreshApp()">&#8635;</button>
    </header>

    <!-- ── Side drawer ──────────────────────────────────────────────── -->
    <div class="drawer-overlay hidden" id="drawer-overlay" onclick="closeMenu()"></div>
    <nav class="drawer" id="drawer" aria-label="Navigation menu">
      <div class="drawer-header">
        <span class="drawer-title">Menu</span>
        <button class="drawer-close" onclick="closeMenu()" aria-label="Close menu">&#10005;</button>
      </div>
      <button class="drawer-item active" id="drawer-sunday"  onclick="selectTab('sunday')">
        &#9788;&nbsp; Sunday Services
      </button>
      <button class="drawer-item" id="drawer-tuesday" onclick="selectTab('tuesday')">
        &#9785;&nbsp; Tuesday Prayer
      </button>
      <button class="drawer-item" id="drawer-special"  onclick="selectTab('special')">
        &#10022;&nbsp; Special Days
      </button>
      <button class="drawer-item hidden-tab" id="drawer-fasting" onclick="selectTab('fasting')">
        &#9670;&nbsp; Fasting Prayer
      </button>
    </nav>

    <!-- ── Main content ─────────────────────────────────────────────── -->
    <main class="content" id="content" role="main">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading schedule…</p>
      </div>
    </main>

  </div><!-- /#app -->

  <!-- ── reCAPTCHA container ──────────────────────────────────────────────── -->
  <div id="recaptcha-container"></div>

  <!-- ── OTP modal overlay ───────────────────────────────────────────────── -->
  <div class="modal-overlay hidden" id="otp-modal" role="dialog"
       aria-modal="true" aria-labelledby="otp-modal-title">
    <div class="modal-box">
      <div class="modal-icon">🔐</div>
      <h2 class="modal-title" id="otp-modal-title">Sign In with OTP</h2>
      
      <!-- Step 1: Phone Number Entry -->
      <div id="phone-entry-step" class="otp-step">
        <p class="modal-desc">Enter your phone number to receive an OTP.</p>
        <input class="otp-input"
               id="phone-input"
               type="tel"
               placeholder="+1234567890"
               autocomplete="tel"
               aria-label="Enter phone number" />
        <p class="otp-error" id="phone-error" aria-live="polite"></p>
        <button class="otp-submit" onclick="sendOtp()">Send OTP</button>
        <button class="otp-cancel" onclick="cancelOtp()">Cancel</button>
      </div>

      <!-- Step 2: OTP Verification -->
      <div id="otp-verify-step" class="otp-step hidden">
        <p class="modal-desc">Enter the 6-digit code sent to your phone.</p>
        <input class="otp-input"
               id="otp-input"
               type="text"
               inputmode="numeric"
               maxlength="6"
               placeholder="000000"
               autocomplete="off"
               aria-label="Enter OTP" />
        <p class="otp-error" id="otp-error" aria-live="polite"></p>
        <button class="otp-submit" onclick="verifyOtp()">Verify OTP</button>
        <button class="otp-cancel" onclick="backToPhoneEntry()">Back</button>
      </div>
    </div>
  </div>

  <!-- ── Admin users modal ───────────────────────────────────────────────── -->
  <div class="modal-overlay hidden" id="admin-users-modal" role="dialog"
       aria-modal="true" aria-labelledby="admin-users-title">
    <div class="modal-box admin-users-box">
      <div class="admin-users-header-row">
        <h2 class="modal-title" id="admin-users-title">Manage Users</h2>
        <button class="picker-close" onclick="closeAdminUsersModal()" aria-label="Close">&#10005;</button>
      </div>
      <p class="modal-desc">Add viewer/admin phone numbers and update access immediately.</p>

      <div class="admin-user-form">
        <input class="otp-input" id="admin-user-phone" type="tel" placeholder="+1234567890" aria-label="Phone number" />
        <select id="admin-user-role" class="picker-select">
          <option value="viewer">Viewer</option>
          <option value="admin">Admin</option>
        </select>
        <button class="otp-submit" onclick="saveAuthorizedUser()">Save User</button>
        <p class="otp-error" id="admin-user-error" aria-live="polite"></p>
      </div>

      <div class="admin-users-list" id="admin-users-list"></div>
    </div>
  </div>

  <!-- Firebase config -->
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <!-- ── Month picker overlay ─────────────────────────────────────────────── -->
  <div class="picker-overlay hidden" id="month-picker">
    <div class="picker-box">
      <div class="picker-header">
        <span class="picker-title">Jump to Month</span>
        <button class="picker-close" onclick="closePicker()" aria-label="Close">&#10005;</button>
      </div>
      <div class="picker-body">
        <select id="picker-select" class="picker-select"></select>
        <button class="picker-go" onclick="jumpToMonth()">Go</button>
      </div>
    </div>
  </div>
</body>
</html>
