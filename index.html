<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <!-- PWA / Home-screen meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Worship Library" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a56db" />
  <meta name="description" content="Monthly Sunday Service & Tuesday Prayer Schedule" />

  <title>Worship Library — Schedule</title>

  <link rel="manifest" href="manifest.json" />
  <!-- iOS home-screen icons (PNG generated by generate-icons.py) -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">

    <!-- ── Header ───────────────────────────────────────────────────── -->
    <header class="app-header">
      <div class="header-logo">&#9776;</div>
      <div class="header-text">
        <h1 class="app-title">Worship Library</h1>
        <p class="app-subtitle">Church Schedule</p>
      </div>
    </header>

    <!-- ── Tab bar ──────────────────────────────────────────────────── -->
    <nav class="tab-bar" role="tablist">
      <button class="tab-btn active"
              id="tab-sunday"
              role="tab"
              aria-selected="true"
              data-tab="sunday"
              onclick="switchTab('sunday')">
        Sunday Services
      </button>
      <button class="tab-btn"
              id="tab-tuesday"
              role="tab"
              aria-selected="false"
              data-tab="tuesday"
              onclick="switchTab('tuesday')">
        Tuesday Prayer
      </button>      <button class="tab-btn tab-btn-special disabled"
              id="tab-special"
              role="tab"
              aria-selected="false"
              aria-disabled="true"
              data-tab="special"
              onclick="switchTab('special')">
        ✦ Special Days
      </button>    </nav>

    <!-- ── Main content ─────────────────────────────────────────────── -->
    <main class="content" id="content" role="main">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading schedule…</p>
      </div>
    </main>

  </div><!-- /#app -->
  <!-- ── PIN modal overlay ───────────────────────────────────────────────── -->
  <div class="modal-overlay hidden" id="pin-modal" role="dialog"
       aria-modal="true" aria-labelledby="pin-modal-title">
    <div class="modal-box">
      <div class="modal-icon">🔒</div>
      <h2 class="modal-title" id="pin-modal-title">Archives PIN</h2>
      <p class="modal-desc">
        Archived months are read-only.<br>
        Enter your PIN to view past schedules.
      </p>
      <div class="pin-row">
        <input class="pin-input"
               id="pin-input"
               type="password"
               inputmode="numeric"
               maxlength="6"
               placeholder="••••"
               autocomplete="off"
               aria-label="Enter PIN" />
        <button class="pin-submit" onclick="submitPin()">View</button>
      </div>
      <p class="pin-error" id="pin-error" aria-live="polite"></p>
      <button class="pin-cancel" onclick="cancelPin()">Cancel</button>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
